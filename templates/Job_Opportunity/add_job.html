{% extends "Login_System/base.html" %}
{% load static %}

{% block content %}
<style>
    body {
        background: url("{% static 'images/5.png' %}") no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
        color: #fff;
        padding: 20px;
    }

    h1 {
        color: #ff00d4;
        text-align: center;
        margin-bottom: 30px;
        text-shadow: 1px 1px 2px #000;
    }

    form {
        background: rgba(0,0,0,0.5);
        max-width: 700px;
        margin: 0 auto;
        padding: 25px;
        border-radius: 10px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea,
    input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: none;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    button {
        background: #ff00d4;
        color: #fff;
        padding: 12px 25px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #e600c7;
    }

    p.error {
        color: #ff4d4d;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
</style>

<h1>Add Job (Admin Only)</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required>

    <label for="company">Company:</label>
    <input type="text" id="company" name="company" required>

    <label for="location">Location:</label>
    <input type="text" id="location" name="location">

    <label for="experience_required">Experience Required:</label>
    <select id="experience_required" name="experience_required">
        <option value="YES">Yes</option>
        <option value="NO" selected>No</option>
    </select>

    <label for="description">Description:</label>
    <textarea id="description" name="description"></textarea>

    <label for="requirements">Requirements:</label>
    <textarea id="requirements" name="requirements"></textarea>

    <label for="deadline">Deadline:</label>
    <input type="date" id="deadline" name="deadline">

    <label for="support_document">Upload Support Document(s):</label>
    <input type="file" id="support_document" name="support_document" accept=".pdf,.doc,.docx" multiple>

    <button type="submit">Add Job</button>
</form>
{% endblock %}
