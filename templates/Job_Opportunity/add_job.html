{% extends "Login_System/base.html" %}
{% load static %}

{% block extra_css %}
<style>
    .admin-form-container {
        padding: 4rem 2rem;
        max-width: 800px;
        margin: 0 auto;
    }

    .form-card {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
        padding: 4rem;
        animation: fadeIn 0.8s ease-out;
    }

    .form-header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .form-header h1 {
        font-family: 'Outfit';
        font-size: 2.5rem;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        color: #475569;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #f1f5f9;
        border-radius: 10px;
        font-size: 1rem;
        background: #f8fafc;
        transition: all 0.2s;
        outline: none;
        color: #1e293b;
    }

    .form-control:focus {
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    textarea.form-control {
        min-height: 120px;
        resize: vertical;
    }

    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 2rem;
    }

    .btn-submit:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
    }

    .error-msg {
        background: #fef2f2;
        color: #991b1b;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 2rem;
        text-align: center;
        font-weight: 600;
        border: 1px solid #fee2e2;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-form-container">
    <div class="form-card">
        <div class="form-header">
            <h1>Post New Job</h1>
            <p style="color: var(--text-muted);">Fill in the details for the new job listing.</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" id="title" name="title" class="form-control"
                    placeholder="e.g. Senior Software Engineer" required>
            </div>

            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company" class="form-control" placeholder="e.g. SAMHUB Tech"
                    required>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" class="form-control" placeholder="e.g. Kigali, Rwanda">
            </div>

            <div class="form-group">
                <label for="experience_required">Experience Level</label>
                <select id="experience_required" name="experience_required" class="form-control">
                    <option value="YES">Experience Required</option>
                    <option value="NO" selected>Entry Level / No Experience</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea id="description" name="description" class="form-control"
                    placeholder="Describe the roles and responsibilities..."></textarea>
            </div>

            <div class="form-group">
                <label for="requirements">Requirements</label>
                <textarea id="requirements" name="requirements" class="form-control"
                    placeholder="List required skills and qualifications..."></textarea>
            </div>

            <div class="form-group">
                <label for="deadline">Application Deadline</label>
                <input type="date" id="deadline" name="deadline" class="form-control">
            </div>

            <div class="form-group">
                <label for="support_document">Support Document (Optional)</label>
                <div style="padding: 1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 12px;">
                    <input type="file" id="support_document" name="support_document" accept=".pdf,.doc,.docx" multiple>
                </div>
                <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">Upload PDF or Word
                    documents.</small>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-plus-circle"></i> Create Job Listing
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="{% url 'admin_job_dashboard' %}"
                style="color: var(--text-muted); text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
