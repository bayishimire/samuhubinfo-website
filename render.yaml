services:
  - type: web
    name: fursalink-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn FursaLink_Info.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fursalink-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: fursalink-db
    plan: free
